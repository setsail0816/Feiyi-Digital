<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>非遗数创跨境平台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft Yahei", sans-serif;
    }
    body {
      background: #f5f5f5;
      color: #333;
    }
    /* 导航栏 */
    nav {
      background: #2c3e50;
      padding: 1rem 2rem;
    }
    .nav-wrap {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
    }
    .nav-wrap a {
      color: white;
      text-decoration: none;
      margin-left: 1.5rem;
    }
    /* 头部横幅 */
    .banner {
      background: #3498db;
      color: white;
      text-align: center;
      padding: 4rem 2rem;
    }
    .banner h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    /* 内容区域 */
    .container {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .card {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 1.5rem;
    }
    .card h2 {
      margin-bottom: 1rem;
      color: #2c3e50;
    }
    .card p {
      line-height: 1.7;
      margin-bottom: 1rem;
    }
    .btn {
      display: inline-block;
      padding: 0.6rem 1.2rem;
      background: #3498db;
      color: white;
      text-decoration: none;
      border-radius: 4px;
    }
    /* 底部 */
    footer {
      background: #2c3e50;
      color: white;
      text-align: center;
      padding: 1.5rem;
      margin-top: 2rem;
    }
  </style>
</head>
<body>

<!-- 导航 -->
<nav>
  <div class="nav-wrap">
    <div class="logo">非遗数创</div>
    <div class="nav-links">
      <a href="#home">首页</a>
      <a href="#about">关于</a>
      <a href="#link">友情链接</a>
    </div>
  </div>
</nav>

<!-- 横幅 -->
<section class="banner" id="home">
  <h1>欢迎访问我的首页</h1>
  <p>简单干净的展示页面，双击即可打开</p>
</section>

<!-- 内容 -->
<div class="container">
  <div class="card" id="about">
    <h2>网站介绍</h2>
    <p>这是一个简单的静态网站首页，用于展示文字、链接和基础内容。你可以随意修改标题、介绍、链接地址。</p>
    <p>支持电脑、手机自适应，直接使用无需配置环境。</p>
  </div>

  <div class="card" id="link">
    <h2>常用链接</h2>
    <p>点击下方按钮跳转到目标网站：</p>
    <a class="btn" href="https://www.baidu.com" target="_blank">百度</a>
    &nbsp;&nbsp;
    <a class="btn" href="https://github.com" target="_blank">GitHub</a>
  </div>
</div>

<!-- 底部 -->
<footer>
  <p>© 2026 非遗数创 版权所有</p>
</footer>

</body>
</html>
